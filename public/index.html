<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🌌 Xavier-OS Awakening</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>

/* 🌌 RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

/* 🌑 DARK WORLD */
body{
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* 📜 SCRIPTURE */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:url("https://i.imgur.com/8IuucQZ.png");
  opacity:.05;
  animation:moveScript 120s linear infinite;
}

/* 🕯️ LIGHT FOLLOW */
.scripture-glow{
  position:fixed;
  inset:0;
  pointer-events:none;
  mix-blend-mode:screen;
  background:
    radial-gradient(circle at var(--x,50%) var(--y,50%),
    rgba(255,180,90,0.25),
    transparent 300px);
}

/* 📊 STATS */
#stats{
  text-align:center;
  margin:10px;
  color:#ffd27a;
  text-shadow:0 0 10px orange;
}

/* 📖 BOOK */
.book{
  width:160px;
  height:200px;
  perspective:800px;
  margin:15px;
}

.book-inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 1s;
}

.book.open .book-inner{
  transform:rotateY(-140deg);
}

/* 📄 PAGES */
.page{
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(#222,#111);
  border-radius:10px;
  box-shadow:0 0 15px orange;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:10px;
  backface-visibility:hidden;
}

.page.back{
  transform:rotateY(180deg);
}

/* ✨ PARTICLES */
.particles{
  position:absolute;
  width:100%;
  height:100%;
}

.particle{
  position:absolute;
  width:5px;
  height:5px;
  background:orange;
  border-radius:50%;
  animation:rise 3s linear;
}

@keyframes rise{
  to{transform:translateY(-150px);opacity:0}
}

/* 🧿 RUNES */
.rune{
  position:fixed;
  opacity:.1;
  font-size:22px;
  animation:floatRune 20s linear infinite;
}

@keyframes floatRune{
  0%{transform:translateY(100vh)}
  100%{transform:translateY(-10vh)}
}

h1{text-align:center;margin:20px}
#rows{display:flex;flex-wrap:wrap;justify-content:center}

button{padding:10px;margin:5px}

</style>
</head>

<body>

<div class="scripture-glow"></div>

<h1>📜 Xavier-OS</h1>

<div id="stats"></div>

<div style="text-align:center;">
  <button onclick="manualXP()">⚡ Gain XP</button>
</div>

<div id="rows"></div>

<div class="rune" style="left:20%">𓂀</div>
<div class="rune" style="left:60%">✶</div>

<audio id="ambient" loop>
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b0d9f.mp3">
</audio>

<audio id="whisper">
  <source src="https://cdn.pixabay.com/audio/2022/03/10/audio_2b7c.mp3">
</audio>

<script>

/* 🔊 AUDIO */
const ambient = document.getElementById("ambient");
const whisper = document.getElementById("whisper");

document.body.addEventListener("click",()=>ambient.play());

/* 💡 LIGHT */
const glow=document.querySelector(".scripture-glow");
document.addEventListener("mousemove",e=>{
  glow.style.setProperty("--x",e.clientX+"px");
  glow.style.setProperty("--y",e.clientY+"px");
});

/* 📚 YOUR BOOKS */
const coreBooks=[
"Vampire System","Gods Eye","My Dragonic System",
"Dragon Inside of Me","Shadow Blade",
"Birth of a Demonic Sword","Legendary Beast Tamer"
];

/* 🔥 GENERATOR */
const words=["Forbidden","Savage","Cursed","Immortal","Awakened"];
const hooks=["System","King","Gate","Empire"];
const ends=["of Shadows","of Blood","of Chaos","of Night"];

function gen(){
  return `${words[Math.random()*words.length|0]} ${hooks[Math.random()*hooks.length|0]} ${ends[Math.random()*ends.length|0]}`;
}

/* 🎮 PLAYER */
let player={level:1,xp:0};
let currentBook=null;

/* ✨ PARTICLES */
function spawnParticles(el){
  const c=el.querySelector(".particles");
  setInterval(()=>{
    const p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*100+"%";
    c.appendChild(p);
    setTimeout(()=>p.remove(),3000);
  },200);
}

/* 📖 BOOK */
function createBook(name){

  const b=document.createElement("div");
  b.className="book";

  if(coreBooks.includes(name)){
    b.style.boxShadow="0 0 25px red,0 0 50px gold";
  }

  b.innerHTML=`
    <div class="book-inner">
      <div class="page">${name}</div>
      <div class="page back">📖</div>
    </div>
    <div class="particles"></div>
  `;

  b.onclick=()=>{
    b.classList.toggle("open");
    whisper.play();
    currentBook=name;
  };

  spawnParticles(b);
  return b;
}

/* ⚡ XP */
function addXP(){
  if(!currentBook) return;

  player.xp+=10;

  if(player.xp>=player.level*100){
    player.xp=0;
    player.level++;
    spawnBook();
  }

  render();
}

function manualXP(){
  addXP();
}

/* 📚 SPAWN */
function spawnBook(){
  const name=Math.random()<0.3
    ? coreBooks[Math.random()*coreBooks.length|0]
    : gen();

  rows.appendChild(createBook(name));

  if(rows.children.length>150){
    rows.removeChild(rows.firstChild);
  }
}

/* 🚀 INIT */
function init(){

  coreBooks.forEach(n=>rows.appendChild(createBook(n)));

  for(let i=coreBooks.length;i<137;i++){
    rows.appendChild(createBook(gen()));
  }

  render();
}

/* 📊 UI */
function render(){
  stats.innerHTML=`
  🔥 Level: ${player.level} |
  ⚡ XP: ${player.xp} |
  📖 ${currentBook || "Choose a book"}
  `;
}

/* 🔄 AUTO LOOP */
setInterval(()=>{
  if(currentBook){
    addXP();
    if(Math.random()<0.3) spawnBook();
  }
},3000);

/* START */
init();

</script>

</body>
</html>
