<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🌌 System Awakening</title>

<!-- 📲 PWA SUPPORT -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>

/* 🌌 RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

/* 🌑 DARK WORLD */
body{
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* 📜 SCRIPTURE */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:url("https://i.imgur.com/8IuucQZ.png");
  opacity:.05;
  animation:moveScript 120s linear infinite;
}

/* 🕯️ LIGHT FOLLOW */
.scripture-glow{
  position:fixed;
  inset:0;
  pointer-events:none;
  mix-blend-mode:screen;
  background:
    radial-gradient(circle at var(--x,50%) var(--y,50%),
    rgba(255,180,90,0.25),
    transparent 300px);
}

/* 📖 3D BOOK */
.book{
  width:160px;
  height:200px;
  perspective:800px;
  margin:15px;
}

.book-inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 1s;
}

.book.open .book-inner{
  transform:rotateY(-140deg);
}

/* 📄 PAGES */
.page{
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(#222,#111);
  border-radius:10px;
  box-shadow:0 0 15px orange;
  display:flex;
  align-items:center;
  justify-content:center;
  backface-visibility:hidden;
}

.page.back{
  transform:rotateY(180deg);
}

/* ✨ PARTICLES */
.particles{
  position:absolute;
  width:100%;
  height:100%;
}

.particle{
  position:absolute;
  width:5px;
  height:5px;
  background:orange;
  border-radius:50%;
  animation:rise 3s linear;
}

@keyframes rise{
  to{transform:translateY(-150px);opacity:0}
}

/* 🧿 RUNES */
.rune{
  position:fixed;
  opacity:.1;
  font-size:22px;
  animation:floatRune 20s linear infinite;
}

@keyframes floatRune{
  0%{transform:translateY(100vh)}
  100%{transform:translateY(-10vh)}
}

h1{text-align:center;margin:20px}

#rows{display:flex;flex-wrap:wrap;justify-content:center}

button{
  padding:10px;
  margin:5px;
}

</style>
</head>

<body>

<div class="scripture-glow"></div>

<h1>📜 System Awakening</h1>

<button onclick="addXP(25)">⚡ XP</button>
<button onclick="unlockReward()">🎁 Pack</button>

<div id="rows"></div>

<div class="rune" style="left:20%">𓂀</div>
<div class="rune" style="left:60%">✶</div>

<!-- 🔊 AUDIO -->
<audio id="ambient" loop>
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b0d9f.mp3">
</audio>

<audio id="whisper">
  <source src="https://cdn.pixabay.com/audio/2022/03/10/audio_2b7c.mp3">
</audio>

<script>

/* 📲 ENABLE APP MODE */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

/* 🔊 SOUND */
const ambient = document.getElementById("ambient");
const whisper = document.getElementById("whisper");

document.body.addEventListener("click",()=>{
  ambient.play();
});

/* 💡 LIGHT */
const glow=document.querySelector(".scripture-glow");

document.addEventListener("mousemove",e=>{
  glow.style.setProperty("--x",e.clientX+"px");
  glow.style.setProperty("--y",e.clientY+"px");
});

/* ✨ PARTICLES */
function spawnParticles(el){
  const c=el.querySelector(".particles");
  setInterval(()=>{
    const p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*100+"%";
    c.appendChild(p);
    setTimeout(()=>p.remove(),3000);
  },200);
}

/* 📖 CREATE BOOK */
function createBook(name){
  const b=document.createElement("div");
  b.className="book";

  b.innerHTML=`
    <div class="book-inner">
      <div class="page">${name}</div>
      <div class="page back">📖</div>
    </div>
    <div class="particles"></div>
  `;

  b.onclick=()=>{
    b.classList.toggle("open");
    whisper.play();
  };

  spawnParticles(b);
  return b;
}

/* 🎮 GAME */
let xp=0;

function addXP(v){
  xp+=v;
}

function unlockReward(){
  const names=["Vampire","Dragonic","Demonic"];
  const r=names[Math.floor(Math.random()*names.length)];

  const book=createBook(r);
  document.getElementById("rows").appendChild(book);
}

</script>

</body>
</html>
