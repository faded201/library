<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xavier OS</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<canvas id="fireflies"></canvas>

<h1>🎧 Xavier OS</h1>

<!-- 🖼 Scene Image -->
<img id="sceneImage" src="" alt="scene">

<div class="audiobook-container">

  <div class="audiobook-card" onclick="startBook('vampire')">
    My Vampire System
  </div>

</div>

<audio id="audio"></audio>
<canvas id="visualizer"></canvas>

<script>
const books = {
  vampire: {
    audio: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
    scenes: [
      "https://images.unsplash.com/photo-1503264116251-35a269479413",
      "https://images.unsplash.com/photo-1506744038136-46273834b3fb",
      "https://images.unsplash.com/photo-1493244040629-496f6d136cc3"
    ],
    characters: ["Quinn", "Layla"]
  }
};

const audio = document.getElementById("audio");
const img = document.getElementById("sceneImage");

let currentBook = null;
let sceneIndex = 0;

/* ▶️ Start Book */
function startBook(name) {
  currentBook = books[name];

  audio.src = currentBook.audio;

  // 🔁 Resume progress
  const savedTime = localStorage.getItem(name);
  if (savedTime) audio.currentTime = savedTime;

  audio.play();

  changeScene();
}

/* 💾 Save progress */
audio.addEventListener("timeupdate", () => {
  if (currentBook) {
    localStorage.setItem("vampire", audio.currentTime);
  }
});

/* 🖼 Change scene every 10s */
function changeScene() {
  if (!currentBook) return;

  img.src = currentBook.scenes[sceneIndex];
  sceneIndex = (sceneIndex + 1) % currentBook.scenes.length;

  setTimeout(changeScene, 10000);
}

/* 📊 Visualizer */
const vis = document.getElementById("visualizer");
const vctx = vis.getContext("2d");

let ctxAudio = new (window.AudioContext || window.webkitAudioContext)();
let analyser = ctxAudio.createAnalyser();
let src = ctxAudio.createMediaElementSource(audio);

src.connect(analyser);
analyser.connect(ctxAudio.destination);

analyser.fftSize = 64;
let buffer = new Uint8Array(analyser.frequencyBinCount);

function drawVis() {
  requestAnimationFrame(drawVis);

  analyser.getByteFrequencyData(buffer);

  vis.width = window.innerWidth;
  vis.height = 100;

  vctx.clearRect(0,0,vis.width,vis.height);

  buffer.forEach((v,i)=>{
    vctx.fillRect(i*20, vis.height-v, 10, v);
  });
}
drawVis();

/* 🔥 Fireflies */
const canvas = document.getElementById("fireflies");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = Array.from({length:80}, ()=>({
  x: Math.random()*canvas.width,
  y: Math.random()*canvas.height
}));

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    p.x += (Math.random()-0.5)*2;
    p.y += (Math.random()-0.5)*2;

    ctx.beginPath();
    ctx.arc(p.x,p.y,2,0,Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();
  });

  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
