<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- PWA + iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Xavier OS">
    <link rel="apple-touch-icon" href="/icon-192.png">

    <link rel="stylesheet" href="styles.css">

    <title>Xavier OS</title>
</head>

<body>

    <!-- 🔥 Fireflies background -->
    <canvas id="fireflies"></canvas>

    <h1 style="text-align:center;">🎧 Xavier OS Audiobooks</h1>

    <div class="audiobook-container">

        <div class="audiobook-card series-my-vampire-system">
            <div class="audiobook-title">My Vampire System</div>
            <div class="audiobook-series">Quinn Talen Universe</div>
            <button class="audiobook-button">▶ Play</button>
        </div>

        <div class="audiobook-card series-my-dragonic-system">
            <div class="audiobook-title">My Dragonic System</div>
            <div class="audiobook-series">Dragon Saga</div>
            <button class="audiobook-button">▶ Play</button>
        </div>

        <div class="audiobook-card series-shadow-blade">
            <div class="audiobook-title">Shadow Blade</div>
            <div class="audiobook-series">Dark Assassin Series</div>
            <button class="audiobook-button">▶ Play</button>
        </div>

    </div>

    <!-- 🔥 Fireflies script -->
    <script>
    const canvas = document.getElementById("fireflies");
    const ctx = canvas.getContext("2d");

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener("resize", resize);

    let particles = [];

    for (let i = 0; i < 60; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2 + 1,
            speedX: Math.random() - 0.5,
            speedY: Math.random() - 0.5
        });
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        particles.forEach(p => {
            p.x += p.speedX;
            p.y += p.speedY;

            if (p.x < 0) p.x = canvas.width;
            if (p.x > canvas.width) p.x = 0;
            if (p.y < 0) p.y = canvas.height;
            if (p.y > canvas.height) p.y = 0;

            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(255,255,200,0.8)";
            ctx.shadowColor = "rgba(255,255,150,0.8)";
            ctx.shadowBlur = 10;
            ctx.fill();
        });

        requestAnimationFrame(animate);
    }

    animate();
    </script>

</body>
</html>
