<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xavier OS</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<canvas id="fireflies"></canvas>

<h1>🎧 Xavier OS</h1>

<input id="search" placeholder="Search books...">

<img id="sceneImage" src="">

<div id="continueRow" class="row"></div>
<div id="rows"></div>

<audio id="audio"></audio>
<canvas id="visualizer"></canvas>

<script>

/* 📚 BOOK SYSTEM (same as before) */
const books = {};

/* 🔥 YOUR MAIN BOOKS */
const mainBooks = [
  "My Vampire System",
  "My Dragonic System",
  "Birth of a Demonic Sword",
  "Legendary Beast Tamer",
  "The Dragon Inside Me",
  "Gods Eye",
  "Vikings: Valhalla Into the After"
];

mainBooks.forEach((title, i) => {
  books["main" + i] = {
    title,
    genre: "Main",
    audio: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
    scenes: [
      `https://picsum.photos/800/400?random=${i}`,
      `https://picsum.photos/800/400?random=${i+100}`
    ]
  };
});

/* 🎭 GENRES */
const genres = ["Fantasy","Sci-Fi","Horror","Romance","Action"];

/* ➕ GENERATE */
let count = Object.keys(books).length;

while (Object.keys(books).length < 137) {
  let genre = genres[count % genres.length];

  books["b" + count] = {
    title: genre + " Book " + count,
    genre,
    audio: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
    scenes: [`https://picsum.photos/800/400?random=${count}`]
  };

  count++;
}

/* 🎴 BUILD UI */
const rowsDiv = document.getElementById("rows");

function buildUI(filter="") {
  rowsDiv.innerHTML = "";

  let grouped = {};

  Object.entries(books).forEach(([key, b]) => {
    if (!b.title.toLowerCase().includes(filter.toLowerCase())) return;

    if (!grouped[b.genre]) grouped[b.genre] = [];
    grouped[b.genre].push({key, ...b});
  });

  Object.keys(grouped).forEach(genre => {
    const row = document.createElement("div");
    row.className = "row";

    const title = document.createElement("h2");
    title.innerText = genre;

    const scroll = document.createElement("div");
    scroll.className = "scroll";

    grouped[genre].forEach(book => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerText = book.title;

      card.onclick = (e)=>startBook(e, book.key);

      scroll.appendChild(card);
    });

    row.appendChild(title);
    row.appendChild(scroll);
    rowsDiv.appendChild(row);
  });
}

buildUI();

/* 🔍 SEARCH */
document.getElementById("search").oninput = (e)=>{
  buildUI(e.target.value);
};

/* 🎧 PLAYER */
const audio = document.getElementById("audio");
const img = document.getElementById("sceneImage");

let currentKey = null;

function startBook(e,key){

  currentKey = key;

  audio.src = books[key].audio;

  let t = localStorage.getItem(key);
  if(t) audio.currentTime = t;

  audio.play();

  img.src = books[key].scenes[0];

  saveContinue(key);
}

/* 💾 SAVE */
audio.ontimeupdate = ()=>{
  if(currentKey){
    localStorage.setItem(currentKey,audio.currentTime);
  }
};

/* 🧠 CONTINUE ROW */
function saveContinue(key){
  let row = document.getElementById("continueRow");
  row.innerHTML = "<h2>Continue Listening</h2>";

  Object.keys(localStorage).forEach(k=>{
    if(books[k]){
      let c = document.createElement("div");
      c.className="card";
      c.innerText = books[k].title;
      c.onclick=()=>startBook(event,k);
      row.appendChild(c);
    }
  });
}

saveContinue();

</script>

</body>
</html>
