<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🌌 Cinematic System Awakening</title>

<style>

/* 🌌 BACKGROUND */
body {
  margin: 0;
  font-family: system-ui, sans-serif;
  color: white;
  overflow-x: hidden;

  background:
    radial-gradient(circle at 20% 30%, #1a1f4b, transparent),
    radial-gradient(circle at 80% 70%, #4b1a3a, transparent),
    radial-gradient(circle at center, #050510, #000000);

  background-size: 200% 200%;
  animation: bgShift 15s ease infinite;
}

@keyframes bgShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ✨ FX */
body::before {
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  top:-50%;
  left:-50%;
  background: radial-gradient(circle, rgba(255,255,255,0.08), transparent 70%);
  animation: rotate 40s linear infinite;
}
@keyframes rotate {
  to { transform: rotate(360deg); }
}

/* 🎧 TITLE */
h1 {
  text-align:center;
  font-size:32px;
}

/* 🎬 SCENE */
#sceneImage {
  width:100%;
  height:220px;
  object-fit:cover;
}

/* 💬 SUB */
#subtitles {
  position:fixed;
  bottom:90px;
  width:100%;
  text-align:center;
  background:rgba(0,0,0,0.6);
  padding:10px;
}

/* 🎮 UI */
#playerStats {
  text-align:center;
  margin:10px;
}

#rows, #cardCollection, #market {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

/* 🎴 CARD */
.card {
  margin:10px;
  padding:15px;
  width:160px;
  border-radius:15px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.2);
  text-align:center;
  cursor:pointer;
}

/* 🌈 RARITY */
.common {border-color:gray;}
.uncommon {border-color:green;}
.rare {border-color:blue;}
.epic {border-color:purple;}
.legendary {border-color:gold;}
.mythical {
  border-color:red;
  box-shadow:0 0 15px red;
}

/* 🔘 BUTTON */
button {
  padding:6px 10px;
  margin-top:5px;
}

</style>
</head>

<body>

<h1>🎧 Cinematic System Awakening</h1>

<!-- 🎮 PLAYER -->
<div id="playerStats"></div>

<button onclick="addXP(25)">⚡ Gain XP</button>
<button onclick="unlockReward()">🎁 Reward</button>

<h2 style="text-align:center;">📚 Audiobooks</h2>
<div id="rows"></div>

<img id="sceneImage">
<div id="subtitles"></div>

<h2 style="text-align:center;">🃏 Cards</h2>
<div id="cardCollection"></div>

<h2 style="text-align:center;">🛒 Market</h2>
<div id="market"></div>

<script>

// 🎧 AUDIO
const music = new Audio("https://cdn.pixabay.com/audio/2022/03/15/audio_7c1b9c3c6e.mp3");
music.loop = true;

// 📚 BOOKS
const books = [
"Vampire System",
"Dragonic System",
"Demonic Sword",
"Beast Tamer",
"Gods Eye"
];

const rows = document.getElementById("rows");
books.forEach(title=>{
  const c = document.createElement("div");
  c.className="card";
  c.innerText=title;
  c.onclick=()=>playBook(title);
  rows.appendChild(c);
});

// 🎮 PLAYER
let player = {
  level:1,
  xp:0,
  coins:100,
  inventory:[]
};

let market=[];

// 💾 SAVE
function save(){
  localStorage.setItem("player", JSON.stringify(player));
}
function load(){
  const d = localStorage.getItem("player");
  if(d) player = JSON.parse(d);
}
load();

// 🌈 RARITY
const rarityMult={
  common:1,
  uncommon:1.5,
  rare:2,
  epic:4,
  legendary:8,
  mythical:15
};

// ⚡ XP
function addXP(x){
  player.xp+=x;
  if(player.xp>=player.level*50){
    player.xp=0;
    player.level++;
    unlockReward();
  }
  save();
  render();
}

// 🎲 DROP
function getReward(){
  const r=Math.random();
  if(r<0.4)return{name:"Strength",rarity:"common"};
  if(r<0.65)return{name:"Instinct",rarity:"uncommon"};
  if(r<0.85)return{name:"Dragon Flame",rarity:"rare"};
  if(r<0.95)return{name:"Shadow Step",rarity:"epic"};
  if(r<0.995)return{name:"God Vision",rarity:"legendary"};
  return{name:"Blood Core",rarity:"mythical"};
}

function unlockReward(){
  const r=getReward();
  let e=player.inventory.find(c=>c.name===r.name);
  if(e)e.level++;
  else player.inventory.push({...r,level:1,id:Date.now()});
  render();
}

// 💪 POWER
function power(){
  let p=player.level;
  player.inventory.forEach(c=>p+=c.level*2);
  return p;
}

// 💰 VALUE
function value(c){
  return Math.floor(10*rarityMult[c.rarity]*c.level*(power()/10));
}

// 🛒 MARKET
function sell(id){
  let c=player.inventory.find(x=>x.id===id);
  market.push({...c,price:value(c)});
  player.inventory=player.inventory.filter(x=>x.id!==id);
  render();
}

function buy(id){
  let c=market.find(x=>x.id===id);
  if(player.coins>=c.price){
    player.coins-=c.price;
    player.inventory.push(c);
    market=market.filter(x=>x.id!==id);
  }
  render();
}

// 🎬 PLAYER
const img=document.getElementById("sceneImage");
const sub=document.getElementById("subtitles");

function playBook(title){
  music.play();

  function next(){
    addXP(10);

    img.src="https://picsum.photos/800/400?"+Math.random();
    sub.innerText=title+"... power rising";

    const u=new SpeechSynthesisUtterance(sub.innerText);
    speechSynthesis.speak(u);
    u.onend=()=>setTimeout(next,800);
  }
  next();
}

// 🎨 RENDER
function render(){

  document.getElementById("playerStats").innerHTML =
    `🔥 Lv.${player.level} | XP ${player.xp} | ⚡ ${power()} | 💰 ${player.coins}`;

  const col=document.getElementById("cardCollection");
  col.innerHTML="";
  player.inventory.forEach(c=>{
    let d=document.createElement("div");
    d.className="card "+c.rarity;
    d.innerHTML=`
      <b>${c.name}</b>
      <p>${c.rarity}</p>
      <p>Lv.${c.level}</p>
      <button onclick="sell(${c.id})">Sell</button>
    `;
    col.appendChild(d);
  });

  const m=document.getElementById("market");
  m.innerHTML="";
  market.forEach(c=>{
    let d=document.createElement("div");
    d.className="card "+c.rarity;
    d.innerHTML=`
      <b>${c.name}</b>
      <p>${c.rarity}</p>
      <p>💰 ${c.price}</p>
      <button onclick="buy(${c.id})">Buy</button>
    `;
    m.appendChild(d);
  });

  save();
}

render();

</script>

</body>
</html>
