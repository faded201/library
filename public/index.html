<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🌌 System Awakening: Final Form</title>

<style>

/* 🌌 RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

/* 🌑 BACKGROUND */
body{
  color:white;
  overflow-x:hidden;
  background: radial-gradient(circle,#0a0a0f,#020203);
}

/* 📜 TEXTURE */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:url("https://i.imgur.com/8IuucQZ.png");
  opacity:.06;
  animation:moveScript 80s linear infinite;
}

/* 🕯️ LIGHT */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,170,90,0.2), transparent),
    radial-gradient(circle at 70% 60%, rgba(255,120,60,0.15), transparent);
  filter:blur(60px);
  animation:lightMove 25s infinite alternate;
}

@keyframes lightMove{
  0%{transform:translate(0,0)}
  100%{transform:translate(100px,-80px)}
}

@keyframes moveScript{
  to{background-position:100% 100%}
}

/* 🧿 UI */
h1{text-align:center;padding:20px;color:#f5e6c8;text-shadow:0 0 15px orange}
#playerStats{text-align:center;margin:10px}

#rows,#cardCollection,#market{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

/* 🎴 CARD */
.card{
  position:relative;
  margin:10px;
  padding:15px;
  width:160px;
  border-radius:15px;
  background:rgba(40,30,20,0.6);
  border:1px solid rgba(255,200,120,0.2);
  text-align:center;
  box-shadow:0 0 10px rgba(255,140,60,0.2);
}

/* 🔥 HOVER */
.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 25px rgba(255,170,90,0.7);
}

/* 📖 OPEN */
.card.opening{
  transform:scale(1.1);
  box-shadow:0 0 50px orange;
}

/* 🌈 RARITY */
.common{border:2px solid gray}
.uncommon{border:2px solid green}
.rare{border:2px solid blue}
.epic{border:2px solid purple}
.legendary{border:2px solid gold}
.mythical{border:2px solid red;box-shadow:0 0 20px red,0 0 60px red}

/* ✨ PARTICLES */
.particles{
  position:absolute;
  left:50%;
  bottom:5px;
  transform:translateX(-50%);
  width:150px;
  height:150px;
  pointer-events:none;
}

.particle{
  position:absolute;
  bottom:0;
  width:5px;
  height:5px;
  border-radius:50%;
  background:radial-gradient(circle,#ffd27a,#ff9a3c);
  opacity:0;
  animation:rise linear forwards;
}

@keyframes rise{
  0%{transform:translateY(0);opacity:0}
  20%{opacity:1}
  100%{
    transform:translateY(-140px) translateX(var(--drift));
    opacity:0;
  }
}

/* 💥 BURST */
.burst{
  position:absolute;
  width:6px;
  height:6px;
  border-radius:50%;
  background:white;
  animation:explode 1s forwards;
}

@keyframes explode{
  to{
    transform:translate(var(--x),var(--y));
    opacity:0;
  }
}

/* 🕯️ FLAME */
.flame{
  position:fixed;
  width:120px;
  height:120px;
  background:radial-gradient(circle,rgba(255,180,80,0.4),transparent);
  filter:blur(20px);
  animation:flicker 2s infinite alternate;
}

@keyframes flicker{
  0%{opacity:.7}
  100%{opacity:1;transform:scale(1.2)}
}

/* 💡 TOUCH LIGHT */
.touch-light{
  position:fixed;
  width:250px;
  height:250px;
  border-radius:50%;
  pointer-events:none;
  background:radial-gradient(circle,rgba(255,200,120,0.25),transparent);
  filter:blur(40px);
}

/* 🔥 FLOOR */
.fire-glow{
  position:fixed;
  bottom:0;
  width:100%;
  height:200px;
  background:radial-gradient(circle,rgba(255,120,40,0.3),transparent);
}

/* 🧿 RUNES */
.rune{
  position:fixed;
  font-size:22px;
  opacity:.12;
  color:#ffc46b;
  animation:floatRune 25s linear infinite;
}

@keyframes floatRune{
  0%{transform:translateY(100vh)}
  100%{transform:translateY(-10vh)}
}

button{margin:5px;padding:8px}

</style>
</head>

<body>

<h1>📜 System Awakening</h1>

<div id="playerStats"></div>

<button onclick="addXP(25)">⚡ XP</button>
<button onclick="unlockReward()">🎁 Pack</button>

<h2>📚 Audiobooks</h2>
<div id="rows"></div>

<h2>🃏 Cards</h2>
<div id="cardCollection"></div>

<h2>🛒 Market</h2>
<div id="market"></div>

<div class="fire-glow"></div>

<div class="rune" style="left:10%">𓂀</div>
<div class="rune" style="left:40%">✶</div>
<div class="rune" style="left:70%">א</div>

<script>

/* 💡 LIGHT FOLLOW */
const light=document.createElement("div");
light.className="touch-light";
document.body.appendChild(light);

document.addEventListener("mousemove",e=>{
  light.style.left=e.clientX-125+"px";
  light.style.top=e.clientY-125+"px";
});

/* ✨ PARTICLES */
function spawnParticles(el){
  const container=document.createElement("div");
  container.className="particles";
  el.appendChild(container);

  setInterval(()=>{
    const p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*100+"%";
    p.style.setProperty("--drift",(Math.random()-0.5)*80+"px");
    p.style.animationDuration=(2+Math.random()*2)+"s";
    container.appendChild(p);
    setTimeout(()=>p.remove(),4000);
  },150);
}

/* 💥 BURST */
function burst(el){
  for(let i=0;i<25;i++){
    const b=document.createElement("div");
    b.className="burst";
    b.style.setProperty("--x",(Math.random()-0.5)*200+"px");
    b.style.setProperty("--y",(Math.random()-0.5)*200+"px");
    el.appendChild(b);
    setTimeout(()=>b.remove(),1000);
  }
}

/* 🕯️ FLAMES */
function flame(x,y){
  const f=document.createElement("div");
  f.className="flame";
  f.style.left=x+"px";
  f.style.top=y+"px";
  document.body.appendChild(f);
}
flame(100,window.innerHeight-150);
flame(window.innerWidth-200,window.innerHeight-180);

/* 🎮 GAME */
let player={level:1,xp:0,coins:100,inventory:[]};
let market=[];

function addXP(x){
  player.xp+=x;
  if(player.xp>=player.level*50){
    player.xp=0;
    player.level++;
    unlockReward();
  }
  render();
}

function drop(){
  let r=Math.random();
  if(r<0.4)return{name:"Strength",rarity:"common"};
  if(r<0.65)return{name:"Instinct",rarity:"uncommon"};
  if(r<0.85)return{name:"Dragon Flame",rarity:"rare"};
  if(r<0.95)return{name:"Shadow Step",rarity:"epic"};
  if(r<0.995)return{name:"God Vision",rarity:"legendary"};
  return{name:"MYTHIC CORE",rarity:"mythical"};
}

function unlockReward(){
  let r=drop();
  player.inventory.push({...r,id:Date.now()});
  render();

  if(r.rarity==="mythical"){
    burst(document.body);
    document.body.style.filter="brightness(2)";
    setTimeout(()=>document.body.style.filter="brightness(1)",200);
  }
}

function render(){

  document.getElementById("playerStats").innerHTML=
    `🔥 Lv.${player.level} | XP ${player.xp} | 💰 ${player.coins}`;

  let rows=document.getElementById("rows");
  rows.innerHTML="";
  ["Vampire","Dragonic","Demonic"].forEach(t=>{
    let d=document.createElement("div");
    d.className="card";
    d.innerText=t;

    d.onclick=()=>{
      d.classList.add("opening");
      burst(d);
      setTimeout(()=>d.classList.remove("opening"),500);
    };

    rows.appendChild(d);
    spawnParticles(d);
  });

  let col=document.getElementById("cardCollection");
  col.innerHTML="";
  player.inventory.forEach(c=>{
    let d=document.createElement("div");
    d.className="card "+c.rarity;
    d.innerText=c.name;
    col.appendChild(d);
    spawnParticles(d);
  });
}

render();

</script>

</body>
</html>
