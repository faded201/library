<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🌌 Xavier-OS Awakening</title>

<meta name="theme-color" content="#000000">

<style>

/* 🌌 RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

/* 🌑 DARK WORLD */
body{
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* 📜 SCRIPTURE BACKGROUND */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:url("https://i.imgur.com/8IuucQZ.png");
  opacity:.05;
}

/* 🕯️ LIGHT FOLLOW */
.scripture-glow{
  position:fixed;
  inset:0;
  pointer-events:none;
  mix-blend-mode:screen;
  background:
    radial-gradient(circle at var(--x,50%) var(--y,50%),
    rgba(255,180,90,0.25),
    transparent 300px);
}

/* 📊 STATS */
#stats{
  text-align:center;
  margin:10px;
  color:#ffd27a;
  text-shadow:0 0 10px orange;
}

/* 📖 BOOK GRID */
#rows{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

/* 📖 BOOK */
.book{
  width:160px;
  height:200px;
  perspective:800px;
  margin:15px;
}

.book-inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 1s;
}

.book.open .book-inner{
  transform:rotateY(-140deg);
}

/* 📄 PAGES */
.page{
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(#222,#111);
  border-radius:10px;
  box-shadow:0 0 15px orange;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:10px;
  backface-visibility:hidden;
}

.page.back{
  transform:rotateY(180deg);
}

/* ✨ PARTICLES */
.particles{
  position:absolute;
  width:100%;
  height:100%;
}

.particle{
  position:absolute;
  width:4px;
  height:4px;
  background:orange;
  border-radius:50%;
  animation:rise 3s linear;
}

@keyframes rise{
  to{transform:translateY(-150px);opacity:0}
}

/* 🧿 RUNES */
.rune{
  position:fixed;
  opacity:.1;
  font-size:22px;
  animation:floatRune 20s linear infinite;
}

@keyframes floatRune{
  0%{transform:translateY(100vh)}
  100%{transform:translateY(-10vh)}
}

/* 📖 READER */
#reader{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.96);
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:999;
}

#readerContent{
  max-width:600px;
  padding:20px;
  line-height:1.7;
  color:#ffd27a;
  text-shadow:0 0 10px orange;
}

button{
  padding:10px;
  margin:5px;
}

h1{text-align:center;margin:20px}

</style>
</head>

<body>

<div class="scripture-glow"></div>

<h1>📜 Xavier-OS</h1>

<div id="stats"></div>

<div style="text-align:center;">
  <button onclick="manualXP()">⚡ Gain XP</button>
</div>

<div id="rows"></div>

<div class="rune" style="left:20%">𓂀</div>
<div class="rune" style="left:60%">✶</div>

<!-- 📖 READER -->
<div id="reader">
  <div id="readerContent"></div>
  <div>
    <button onclick="prevPage()">⬅️</button>
    <button onclick="nextPage()">➡️</button>
    <button onclick="closeReader()">❌</button>
  </div>
</div>

<!-- 🔊 AUDIO -->
<audio id="ambient" loop>
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b0d9f.mp3">
</audio>

<audio id="whisper">
  <source src="https://cdn.pixabay.com/audio/2022/03/10/audio_2b7c.mp3">
</audio>

<script>

/* 🔊 AUDIO */
const ambient=document.getElementById("ambient");
const whisper=document.getElementById("whisper");
document.body.addEventListener("click",()=>ambient.play());

/* 💡 LIGHT */
document.addEventListener("mousemove",e=>{
  document.querySelector(".scripture-glow")
  .style.setProperty("--x",e.clientX+"px");
  document.querySelector(".scripture-glow")
  .style.setProperty("--y",e.clientY+"px");
});

/* 📚 CORE BOOKS */
const coreBooks=[
"Vampire System","Gods Eye","My Dragonic System",
"Dragon Inside of Me","Shadow Blade",
"Birth of a Demonic Sword","Legendary Beast Tamer"
];

/* 🔥 GENERATOR */
const w=["Forbidden","Savage","Cursed","Immortal","Awakened"];
const h=["System","King","Gate","Empire"];
const e=["of Shadows","of Blood","of Chaos","of Night"];

const gen=()=>`${w[Math.random()*w.length|0]} ${h[Math.random()*h.length|0]} ${e[Math.random()*e.length|0]}`;

/* 🎮 PLAYER */
let player={level:1,xp:0};
let currentBook=null;

/* 💾 SAVE */
function save(){localStorage.setItem("xos",JSON.stringify(player))}
function load(){
  const d=localStorage.getItem("xos");
  if(d) player=JSON.parse(d);
}

/* 📖 STORY */
const stories={};

function story(title){
  if(stories[title]) return stories[title];

  let pages=[];
  for(let i=1;i<=10;i++){
    pages.push(`
      <h3>${title} — Chapter ${i}</h3>
      <p>
      The system awakened.
      Power surged.
      ${title} has begun.
      Every step forward reshapes destiny.
      </p>
    `);
  }

  stories[title]=pages;
  return pages;
}

/* 📖 READER */
let page=0,pages=[];

function openReader(t){
  currentBook=t;
  pages=story(t);
  page=parseInt(localStorage.getItem("p_"+t))||0;
  reader.style.display="flex";
  renderPage();
}

function renderPage(){
  readerContent.innerHTML=pages[page];
}

function nextPage(){
  if(page<pages.length-1){
    page++;
    localStorage.setItem("p_"+currentBook,page);
    addXP();
    renderPage();
  }
}

function prevPage(){
  if(page>0){
    page--;
    localStorage.setItem("p_"+currentBook,page);
    renderPage();
  }
}

function closeReader(){
  reader.style.display="none";
}

/* ✨ PARTICLES */
function particles(el){
  const c=el.querySelector(".particles");
  setInterval(()=>{
    const p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*100+"%";
    c.appendChild(p);
    setTimeout(()=>p.remove(),3000);
  },200);
}

/* 📖 BOOK */
function createBook(name){
  const b=document.createElement("div");
  b.className="book";

  if(coreBooks.includes(name)){
    b.style.boxShadow="0 0 25px red,0 0 50px gold";
  }

  b.innerHTML=`
  <div class="book-inner">
    <div class="page">${name}</div>
    <div class="page back">📖</div>
  </div>
  <div class="particles"></div>`;

  b.onclick=()=>{
    b.classList.toggle("open");
    whisper.play();
    openReader(name);
  };

  particles(b);
  return b;
}

/* ⚡ XP */
function addXP(){
  player.xp+=15;

  if(player.xp>=player.level*100){
    player.xp=0;
    player.level++;
    spawn();
  }

  save();
  render();
}

function manualXP(){addXP();}

/* 📚 SPAWN */
function spawn(){
  const name=Math.random()<0.3
    ? coreBooks[Math.random()*coreBooks.length|0]
    : gen();

  rows.appendChild(createBook(name));

  if(rows.children.length>150){
    rows.removeChild(rows.firstChild);
  }
}

/* 🚀 INIT */
function init(){
  load();

  coreBooks.forEach(n=>rows.appendChild(createBook(n)));

  for(let i=coreBooks.length;i<137;i++){
    rows.appendChild(createBook(gen()));
  }

  render();
}

/* 📊 UI */
function render(){
  stats.innerHTML=
  `🔥 Level ${player.level} | ⚡ XP ${player.xp} | 📖 ${currentBook||"Choose"}`;
}

/* 🔄 LOOP */
setInterval(()=>{
  if(currentBook){
    addXP();
    if(Math.random()<0.25) spawn();
  }
},3000);

init();

</script>

</body>
</html>
