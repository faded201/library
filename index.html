<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🌌 Xavier-OS Awakening</title>

<meta name="theme-color" content="#000000">

<style>

/* 🌌 RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

/* 🌑 DARK WORLD */
body{
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* 📜 BACKGROUND */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:url("https://i.imgur.com/8IuucQZ.png");
  opacity:.05;
}

/* 💡 LIGHT */
.scripture-glow{
  position:fixed;
  inset:0;
  pointer-events:none;
  mix-blend-mode:screen;
  background:
    radial-gradient(circle at var(--x,50%) var(--y,50%),
    rgba(255,180,90,0.25),
    transparent 300px);
}

/* 📊 STATS */
#stats{
  text-align:center;
  margin:10px;
  color:#ffd27a;
}

/* 📖 GRID */
#rows{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

/* 📖 BOOK */
.book{
  width:160px;
  margin:15px;
  cursor:pointer;
  transition:.3s;
}

.book:hover{
  transform:scale(1.05);
}

/* 📷 COVER */
.cover{
  width:100%;
  height:140px;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 0 15px rgba(255,140,60,0.4);
}

.cover img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:.4s;
}

.book:hover img{
  transform:scale(1.1);
}

/* 📖 TITLE */
.book-title{
  text-align:center;
  margin-top:6px;
  font-size:14px;
}

/* 📖 READER */
#reader{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.96);
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:999;
}

#readerContent{
  max-width:600px;
  padding:20px;
  color:#ffd27a;
}

/* BUTTON */
button{
  padding:10px;
  margin:5px;
}

h1{text-align:center;margin:20px}

/* ⭐ FAVORITES */
#favorites{
  text-align:center;
  margin:10px;
  color:gold;
}

/* 🔐 ONBOARDING */
#onboarding{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.box{
  background:#111;
  padding:20px;
  border-radius:10px;
  width:300px;
  text-align:center;
}

.box input{
  width:100%;
  margin:5px 0;
  padding:8px;
}

</style>
</head>

<body>

<div id="onboarding">
  <div class="box">
    <h2>🔮 Setup AI (Optional)</h2>
    <input id="gemini" placeholder="Gemini API Key">
    <input id="groq" placeholder="Groq API Key">
    <button onclick="saveKeys()">Enter</button>
  </div>
</div>

<div class="scripture-glow"></div>

<h1>📜 Xavier-OS</h1>

<div id="stats"></div>
<div id="favorites"></div>

<div style="text-align:center;">
  <button onclick="manualXP()">⚡ Gain XP</button>
</div>

<div id="rows"></div>

<!-- 📖 READER -->
<div id="reader">
  <div id="readerContent"></div>
  <div>
    <button onclick="prevPage()">⬅️</button>
    <button onclick="nextPage()">➡️</button>
    <button onclick="closeReader()">❌</button>
  </div>
</div>

<!-- 🔊 AUDIO -->
<audio id="ambient" loop>
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b0d9f.mp3">
</audio>

<script>

/* 🔑 KEYS */
const AI_KEYS = {};

/* SAVE KEYS */
function saveKeys(){
  AI_KEYS.GEMINI = document.getElementById("gemini").value;
  AI_KEYS.GROQ = document.getElementById("groq").value;

  localStorage.setItem("keys", JSON.stringify(AI_KEYS));
  document.getElementById("onboarding").style.display="none";
}

/* LOAD KEYS */
(function(){
  const k = JSON.parse(localStorage.getItem("keys")||"{}");
  Object.assign(AI_KEYS,k);
  if(k.GEMINI||k.GROQ){
    document.getElementById("onboarding").style.display="none";
  }
})();

/* 🔊 AUDIO */
const ambient=document.getElementById("ambient");
document.body.addEventListener("click",()=>ambient.play().catch(()=>{}));

/* 💡 LIGHT */
document.addEventListener("mousemove",e=>{
  document.querySelector(".scripture-glow")
  .style.setProperty("--x",e.clientX+"px");
});

/* 📚 CORE */
const coreBooks=[
"Vampire System","Gods Eye","My Dragonic System",
"Dragon Inside of Me","Shadow Blade",
"Birth of a Demonic Sword","Legendary Beast Tamer"
];

/* ❤️ FAVORITES */
let fav = JSON.parse(localStorage.getItem("fav")||"[]");

function toggleFav(n){
  fav = fav.includes(n)?fav.filter(x=>x!=n):[...fav,n];
  localStorage.setItem("fav",JSON.stringify(fav));
  renderFav();
}

function renderFav(){
  const f=document.getElementById("favorites");
  f.innerHTML="⭐ "+fav.join(" | ");
}

/* 🖼️ IMAGE */
function img(title){
  return `https://image.pollinations.ai/prompt/${encodeURIComponent(title+" fantasy cinematic character")}`;
}

/* 📖 BOOK */
function createBook(name){
  const b=document.createElement("div");
  b.className="book";

  b.innerHTML=`
    <div class="cover">
      <img src="${img(name)}">
    </div>
    <div class="book-title">${name}</div>
    <button onclick="toggleFav('${name}')">⭐</button>
  `;

  b.onclick=()=>openReader(name);
  return b;
}

/* 📖 STORY */
function story(t){
  return Array.from({length:10},(_,i)=>`
    <h3>${t} — Chapter ${i+1}</h3>
    <p>A cinematic journey unfolds... power awakens within.</p>
  `);
}

/* 📖 READER */
let page=0,pages=[],currentBook=null;

function openReader(t){
  currentBook=t;
  pages=story(t);
  page=0;
  reader.style.display="flex";
  renderPage();
}

function renderPage(){
  readerContent.innerHTML=pages[page];
}

function nextPage(){if(page<pages.length-1){page++;renderPage();addXP();}}
function prevPage(){if(page>0){page--;renderPage();}}
function closeReader(){reader.style.display="none";}

/* ⚡ XP */
let player={level:1,xp:0};

function addXP(){
  player.xp+=10;
  if(player.xp>=player.level*100){
    player.xp=0;
    player.level++;
    spawn();
  }
  render();
}

function manualXP(){addXP();}

/* 📚 SPAWN */
function spawn(){
  const name=Math.random()<0.3
    ? coreBooks[Math.random()*coreBooks.length|0]
    : "Generated Fantasy Book";

  rows.appendChild(createBook(name));
}

/* 📊 UI */
function render(){
  stats.innerHTML=`🔥 Level ${player.level} | ⚡ XP ${player.xp}`;
}

/* 🚀 INIT */
function init(){
  coreBooks.forEach(n=>rows.appendChild(createBook(n)));
  for(let i=0;i<130;i++) rows.appendChild(createBook("Mystery Book "+i));
  renderFav();
  render();
}

init();

</script>

</body>
</html>
