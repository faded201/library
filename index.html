<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🌌 Xavier-OS Awakening</title>
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">

<style>
/* 🌌 RESET & THEME */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Garamond', serif}
body{background:#000;color:#fff;overflow-x:hidden;cursor:crosshair}
body::before{content:"";position:fixed;inset:0;background:url("https://i.imgur.com/8IuucQZ.png");opacity:.05;pointer-events:none}

/* 💡 DYNAMIC LIGHTING */
.scripture-glow{position:fixed;inset:0;pointer-events:none;mix-blend-mode:screen;background:radial-gradient(circle at var(--x,50%) var(--y,50%),rgba(255,180,90,0.2),transparent 400px);z-index:1}

/* 📊 INTERFACE */
h1{text-align:center;margin:30px 0;letter-spacing:5px;color:#ffd27a;text-shadow:0 0 10px rgba(255,210,122,0.5)}
#stats{text-align:center;margin:10px;color:#ffd27a;font-size:0.9rem;text-transform:uppercase;letter-spacing:2px}
#favorites{text-align:center;margin:10px;color:gold;font-style:italic}

/* 📖 THE ARCHIVE GRID */
#rows{display:flex;flex-wrap:wrap;justify-content:center;padding:20px;position:relative;z-index:2}

/* 📖 LUXURY BOOK COVER */
.book{width:160px;margin:25px;cursor:pointer;transition:transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)}
.book:hover{transform:scale(1.1) translateY(-10px)}

.cover{
  width:100%;height:220px;border-radius:5px 15px 15px 5px;overflow:hidden;
  box-shadow:10px 10px 20px rgba(0,0,0,0.8);border-left:8px solid #1a0f0a;
  position:relative;background:#2a1a12;border:1px solid rgba(212,175,55,0.3);
}

.character-oval{
    position:absolute;top:50%;left:55%;transform:translate(-50%,-50%);
    width:70%;height:60%;border-radius:50%;border:2px solid #ffd27a;
    overflow:hidden;background:#000;box-shadow:0 0 15px rgba(255,210,122,0.3);
}

.character-oval img{width:100%;height:100%;object-fit:cover;transition:.5s;filter:sepia(0.2)}
.book:hover img{transform:scale(1.15);filter:sepia(0)}

.book-title{text-align:center;margin-top:12px;font-size:14px;color:#e0e0e0;font-weight:bold}

/* 📖 CINEMATIC READER */
#reader{
  position:fixed;inset:0;background:rgba(0,0,0,0.98);display:none;
  z-index:999;flex-direction:row;
}

.reader-split{display:flex;width:100%;height:100%}
.reader-visual{flex:1;display:flex;align-items:center;justify-content:center;background:#000;padding:40px}
.reader-visual img{width:80%;border:3px solid #ffd27a;box-shadow:0 0 50px rgba(0,0,0,1)}

.reader-text-panel{flex:1;padding:60px;overflow-y:auto;background:linear-gradient(to right, #05070a, #0f1218);display:flex;flex-direction:column}
#readerContent{line-height:1.8;font-size:1.2rem;color:#ccc;text-align:justify}
#readerContent h2{color:#ffd27a;margin-bottom:20px}

.controls{margin-top:auto;padding-top:40px;display:flex;gap:10px}
button{background:transparent;border:1px solid #ffd27a;color:#ffd27a;padding:10px 20px;cursor:pointer;transition:.3s;text-transform:uppercase;letter-spacing:1px}
button:hover{background:#ffd27a;color:#000}

/* 🔐 ONBOARDING */
#onboarding{position:fixed;inset:0;background:#000;display:flex;justify-content:center;align-items:center;z-index:9999}
.box{background:#111;padding:40px;border:1px solid #ffd27a;border-radius:2px;width:350px;text-align:center;box-shadow:0 0 30px rgba(255,210,122,0.1)}
.box input{width:100%;margin:15px 0;padding:12px;background:#000;border:1px solid #333;color:#fff;outline:none}
.box input:focus{border-color:#ffd27a}
</style>
</head>

<body>

<div id="onboarding">
  <div class="box">
    <h2 style="color:#ffd27a; margin-bottom:10px">XAVIER-OS V2 INITIALIZATION</h2>
    <p style="font-size:0.8rem; color:#888">Enter Tokens for Autonomous v2 Operation</p>
    <input id="gemini" type="password" placeholder="Gemini API Key">
    <input id="github" type="password" placeholder="GitHub Access Token">
    <button onclick="saveKeys()">WAKE XAVIER</button>
  </div>
</div>

<div class="scripture-glow"></div>

<h1>📜 XAVIER-OS</h1>

<div id="stats"></div>
<div id="favorites"></div>

<div id="rows"></div>

<div id="reader">
  <div class="reader-split">
    <div class="reader-visual">
        <img id="readerArt" src="">
    </div>
    <div class="reader-text-panel">
        <div id="readerContent"></div>
        <div class="controls">
            <button onclick="prevPage()">⬅ Previous</button>
            <button onclick="nextPage()">Next ➡</button>
            <button onclick="closeReader()">❌ Close Archive</button>
        </div>
    </div>
  </div>
</div>

<audio id="ambient" loop><source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b0d9f.mp3"></audio>
<audio id="whisper"><source src="https://www.soundjay.com/buttons/sounds/button-29.mp3"></audio>

<script>
/* 🔑 SYSTEM KEYS & V2 CONFIG */
const AI_KEYS = { GEMINI: "", GITHUB: "" };
const REPO_PATH = "faded201/Xavier-OS";
const CACHE_NAME = "xavier-os-v2";

/* SAVE & LOAD KEYS */
function saveKeys(){
  AI_KEYS.GEMINI = document.getElementById("gemini").value;
  AI_KEYS.GITHUB = document.getElementById("github").value;
  localStorage.setItem("xavier_keys", JSON.stringify(AI_KEYS));
  document.getElementById("onboarding").style.display="none";
  location.reload();
}

(function loadKeys(){
  const k = JSON.parse(localStorage.getItem("xavier_keys")||"{}");
  Object.assign(AI_KEYS, k);
  if(k.GEMINI) document.getElementById("onboarding").style.display="none";
})();

/* 💡 LIGHT FOLLOW */
document.addEventListener("mousemove", e => {
  const glow = document.querySelector(".scripture-glow");
  if(glow) {
    glow.style.setProperty("--x", e.clientX + "px");
    glow.style.setProperty("--y", e.clientY + "px");
  }
});

/* 🔊 AUDIO CONTROL */
const ambient = document.getElementById("ambient");
const whisper = document.getElementById("whisper");
document.body.addEventListener("click", () => ambient.play().catch(()=>{}), {once: true});

/* 📚 THE CORE ARCHIVE */
const coreBooks = ["Vampire System", "Gods Eye", "My Dragonic System", "Dragon Inside of Me", "Shadow Blade", "Birth of a Demonic Sword", "Legendary Beast Tamer"];

/* 🚀 AUTONOMOUS ARCHIVER (GITHUB POST) */
async function autoArchive(title, text, image) {
  if(!AI_KEYS.GITHUB) return;
  const filename = `library/${title.replace(/\s+/g, '_').toLowerCase()}.json`;
  const content = btoa(unescape(encodeURIComponent(JSON.stringify({title, text, image, date: new Date().toISOString()}, null, 2))));
  
  try {
    await fetch(`https://api.github.com/repos/${REPO_PATH}/contents/${filename}`, {
      method: "PUT",
      headers: { "Authorization": `Bearer ${AI_KEYS.GITHUB}`, "Content-Type": "application/json" },
      body: JSON.stringify({ message: `Xavier-OS v2 Auto-Gen: ${title}`, content: content })
    });
  } catch (e) { console.error("Archive Failed."); }
}

/* 🧠 AI STORY GENERATION (GEMINI 3 FLASH) */
async function generateAIPages(title) {
    if(!AI_KEYS.GEMINI) return ["<p>No Gemini Key detected. Access denied.</p>"];
    try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${AI_KEYS.GEMINI}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ contents: [{ parts: [{ text: `You are Xavier. Write a cinematic, dark fantasy chapter for "${title}".` }] }] })
        });
        const data = await res.json();
        const fullText = data.candidates[0].content.parts[0].text;
        autoArchive(title, fullText, `https://image.pollinations.ai/prompt/${encodeURIComponent(title)}`);
        return fullText.match(/.{1,800}/g).map(t => `<p>${t}</p>`);
    } catch (e) { return ["<p>The archives are failing. Check connection.</p>"]; }
}

/* 📖 READER ENGINE */
let page=0, pages=[], currentBook=null;

async function openReader(t){
  whisper.play().catch(()=>{});
  currentBook = t;
  document.getElementById("readerArt").src = `https://image.pollinations.ai/prompt/${encodeURIComponent(t + " dark fantasy portrait")}`;
  document.getElementById("readerContent").innerHTML = "<h2>Awakening Archive...</h2>";
  document.getElementById("reader").style.display = "flex";
  pages = await generateAIPages(t);
  page = 0;
  renderPage();
  speak(pages[0]);
}

function renderPage(){
  document.getElementById("readerContent").innerHTML = `<h2>${currentBook}</h2>` + pages[page];
}

function nextPage(){ if(page < pages.length - 1){ page++; renderPage(); addXP(); speak(pages[page]); }}
function prevPage(){ if(page > 0){ page--; renderPage(); speak(pages[page]); }}
function closeReader(){ document.getElementById("reader").style.display="none"; window.speechSynthesis.cancel(); }

/* 🔊 TEXT-TO-SPEECH */
function speak(html){
    window.speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(html.replace(/<[^>]*>/g, ''));
    msg.rate = 0.9;
    window.speechSynthesis.speak(msg);
}

/* ⚡ PROGRESSION SYSTEM */
let player = JSON.parse(localStorage.getItem("xavier_player") || '{"level":1,"xp":0}');

function addXP(){
  player.xp += 15;
  if(player.xp >= player.level * 100){ player.xp = 0; player.level++; }
  localStorage.setItem("xavier_player", JSON.stringify(player));
  renderStats();
}

/* 📚 LIBRARY UI */
function createBook(name){
  const b = document.createElement("div");
  b.className = "book";
  b.innerHTML = `
    <div class="cover">
      <div class="character-oval">
        <img src="https://image.pollinations.ai/prompt/${encodeURIComponent(name + " fantasy portrait")}" loading="lazy">
      </div>
    </div>
    <div class="book-title">${name}</div>
  `;
  b.onclick = () => openReader(name);
  return b;
}

function renderStats(){
  document.getElementById("stats").innerHTML = `🔥 Rank: Level ${player.level} | ⚡ Essence: ${player.xp} XP`;
}

/* =========================
   🚀 V2 SERVICE WORKER REGISTRATION
========================= */
function init(){
  const rows = document.getElementById("rows");
  coreBooks.forEach(n => rows.appendChild(createBook(n)));
  for(let i=0; i<40; i++) rows.appendChild(createBook("Lost Archive "+i));
  renderStats();
  
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').then(reg => {
        console.log('Xavier v2 Service Worker Active');
      });
    });
  }
}

init();
</script>
</body>
</html>
