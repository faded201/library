<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aetheria.ai - Stories Without Boundaries</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link href="aetheria-styles.css" rel="stylesheet">
</head>
<body>

  <!-- Header -->
  <header class="main-header">
    <div class="logo-section">
      <h1 class="main-title">Aetheria.ai</h1>
      <p class="subtitle">AI-powered audiobooks with 23-minute episodes. Dynamic narration, generated illustrations, and stories that evolve.</p>
    </div>
  </header>

  <!-- Genre Filters -->
  <section class="genre-filters">
    <button class="genre-btn active" data-genre="all">All</button>
    <button class="genre-btn" data-genre="fantasy">Fantasy</button>
    <button class="genre-btn" data-genre="sci-fi">Sci-Fi</button>
    <button class="genre-btn" data-genre="mystery">Mystery</button>
    <button class="genre-btn" data-genre="romance">Romance</button>
    <button class="genre-btn" data-genre="horror">Horror</button>
    <button class="genre-btn" data-genre="litrpg">LitRPG</button>
    <button class="genre-btn" data-genre="cultivation">Cultivation</button>
  </section>

  <!-- AI Model Selector -->
  <section class="ai-selector">
    <label class="ai-label">Choose Your AI Storyteller:</label>
    <select id="aiModelSelect" class="ai-dropdown">
      <option value="gemini">Gemini (Free)</option>
      <option value="grok">Grok (Free)</option>
      <option value="mistral">Mistral (Free)</option>
      <option value="claude">Claude (Paid - Best Memory)</option>
      <option value="gpt4">GPT-4 (Paid - High Quality)</option>
      <option value="sonnet">Sonnet (Paid - Premium)</option>
    </select>
  </section>

  <!-- Books Grid -->
  <main class="books-container">
    <div class="books-grid" id="booksGrid">
      <!-- Books will be dynamically generated here -->
    </div>
  </main>

  <!-- Audiovisual Player -->
  <div id="audiovisualPlayer" class="audiovisual-player hidden">
    <div class="player-backdrop" onclick="closePlayer()"></div>
    <div class="player-content">
      <div class="visual-section">
        <img id="sceneImage" src="" alt="Story Scene" class="scene-image">
        <div class="scene-overlay">
          <h2 id="bookTitle" class="book-title"></h2>
          <p id="chapterInfo" class="chapter-info"></p>
        </div>
      </div>
      
      <div class="player-controls">
        <audio id="audioPlayer" controls class="audio-player"></audio>
        <div class="story-info">
          <p><strong>Words:</strong> <span id="wordCount">0</span></p>
          <p><strong>Read Time:</strong> <span id="readTime">0</span> min</p>
          <p><strong>Protagonist:</strong> <span id="protagonist">Unknown</span></p>
        </div>
        <button class="close-btn" onclick="closePlayer()">Close Story</button>
      </div>
    </div>
  </div>

  <!-- Load books database first, then main script -->
  <script src="books-database.js"></script>
  <script src="aetheria-script.js"></script>

</body>
</html>
